<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quicker Ticker</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body class="qt qt-sidepanel">
    <div class="qt-shell">
      <header class="qt-header">
        <div class="qt-title-row">
          <div class="qt-title">
            <span class="qt-mark">✦</span>
            <span>Quicker Ticker</span>
          </div>
          <div class="qt-header-actions">
            <button type="button" id="qt-refresh" class="qt-icon-btn" title="Refresh">↻</button>
            <button type="button" id="qt-settings" class="qt-icon-btn" title="Settings">⚙</button>
          </div>
        </div>
        <div class="qt-date" id="qt-date"></div>
        <div class="qt-search-wrap">
          <input type="text" id="qt-search" class="qt-search" placeholder="Add symbol (e.g. GOOG)" autocomplete="off" />
          <div id="qt-search-dropdown" class="qt-search-dropdown"></div>
        </div>
      </header>

      <main class="qt-main">
        <div id="qt-list" class="qt-list"></div>
      </main>

      <footer class="qt-footer">
        <div id="qt-total" class="qt-total" style="display:none;">
          <span class="qt-total-label">Total</span>
          <span class="qt-total-value">—</span>
        </div>
        <button type="button" id="qt-bonuses-toggle" class="qt-bonuses-toggle" aria-expanded="false">
          Bonuses &amp; Discounts
        </button>
        <div id="qt-bonuses-panel" class="qt-bonuses-panel"></div>
        <div class="qt-version-row">
          <span id="qt-version" class="qt-version"></span>
        </div>
      </footer>
    </div>

    <script src="shared/storage.js"></script>
    <script src="shared/tickers.js"></script>
    <script src="shared/config.js"></script>
    <script src="shared/chart.js"></script>
    <script src="shared/ui.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
